<svg xmlns="http://www.w3.org/2000/svg" width="240" height="420" viewBox="0 0 240 420">
  <g fill="none" stroke="#C9A86A" stroke-width="1.6" stroke-linecap="round">
    <!-- main winding stem: enters top-centre vertical, exits bottom-centre vertical (seamless tile) -->
    <path d="M120,0
             C120,45 165,75 165,120
             C165,162 72,182 72,224
             C72,266 168,286 168,330
             C168,372 120,378 120,420"/>

    <!-- spiral flourishes at the bends -->
    <path d="M165,120 C182,116 190,132 178,140 C170,145 162,138 166,131" stroke-width="1.3"/>
    <path d="M72,224 C55,220 47,236 59,244 C67,249 75,242 71,235" stroke-width="1.3"/>
    <path d="M168,330 C185,326 193,342 181,350 C173,355 165,348 169,341" stroke-width="1.3"/>

    <!-- leaves (almond) + veins along the stem -->
    <g stroke-width="1.3">
      <!-- upper right -->
      <path d="M150,92 C168,80 190,84 198,72 C186,90 168,96 150,92 Z" fill="#C9A86A" fill-opacity="0.10"/>
      <path d="M156,88 L188,76" stroke-width="0.9"/>
      <!-- mid left -->
      <path d="M96,196 C78,184 56,188 48,176 C60,194 78,200 96,196 Z" fill="#C9A86A" fill-opacity="0.10"/>
      <path d="M90,192 L58,180" stroke-width="0.9"/>
      <!-- lower right -->
      <path d="M150,302 C168,290 190,294 198,282 C186,300 168,306 150,302 Z" fill="#C9A86A" fill-opacity="0.10"/>
      <path d="M156,298 L188,286" stroke-width="0.9"/>
      <!-- small buds -->
      <circle cx="140" cy="150" r="3.4" fill="#C9A86A" fill-opacity="0.16" stroke-width="1"/>
      <circle cx="100" cy="256" r="3.4" fill="#C9A86A" fill-opacity="0.16" stroke-width="1"/>
      <circle cx="146" cy="360" r="3.4" fill="#C9A86A" fill-opacity="0.16" stroke-width="1"/>
    </g>
  </g>
</svg>
